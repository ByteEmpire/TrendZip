<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Primary Meta ─────────────────────────────────────────── -->
    <title>TrendZip — Wear the Trend</title>
    <meta
      name="description"
      content="Discover premium fashion for the modern Indian. Shop the latest trends in clothing, footwear, and accessories at TrendZip."
    />
    <meta
      name="keywords"
      content="fashion, clothing, trendy, Indian fashion, online shopping, TrendZip"
    />
    <meta name="author" content="TrendZip" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- ─── Canonical ────────────────────────────────────────────── -->
    <link rel="canonical" href="https://trendzip.in/" />

    <!-- ─── Open Graph ───────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trendzip.in/" />
    <meta property="og:title" content="TrendZip — Wear the Trend" />
    <meta
      property="og:description"
      content="Discover premium fashion for the modern Indian. Shop the latest trends at TrendZip."
    />
    <meta property="og:image" content="https://trendzip.in/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TrendZip — Premium Indian Fashion" />
    <meta property="og:site_name" content="TrendZip" />
    <meta property="og:locale" content="en_IN" />

    <!-- ─── Twitter Card ─────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@trendzip" />
    <meta name="twitter:creator" content="@trendzip" />
    <meta name="twitter:title" content="TrendZip — Wear the Trend" />
    <meta
      name="twitter:description"
      content="Discover premium fashion for the modern Indian."
    />
    <meta name="twitter:image" content="https://trendzip.in/og-image.jpg" />
    <meta name="twitter:image:alt" content="TrendZip — Premium Indian Fashion" />

    <!-- ─── Favicon & App Icons ──────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- ─── DNS Prefetch & Preconnect ───────────────────────────── -->
    <!--
      preconnect for origins whose assets load at render time (fonts).
      crossorigin is required on font preconnects (CORS).
      dns-prefetch added alongside preconnect for broader browser support.
      Razorpay is deferred → dns-prefetch only (preconnect would waste a TCP slot).
      Supabase does NOT get crossorigin — it is not a CORS font origin.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />
    <link rel="dns-prefetch" href="https://lumberjack.razorpay.com" />
    <link rel="dns-prefetch" href="https://zfpammkxzddtryqdoeme.supabase.co" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- ─── Google Fonts ─────────────────────────────────────────── -->
    <!--
      Preload the stylesheet so the browser discovers font file URLs earlier.
      media="print" + onload swap is the recommended non-blocking pattern.
      font-display=swap (set by Google) prevents FOIT on slow connections.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&display=swap"
      />
    </noscript>

    <!-- ─── Critical Inline Styles ───────────────────────────────── -->
    <!--
      Inlined so the browser paints the correct background + text colour
      on the very first frame — before any CSS bundle arrives.
      The #root:empty rule acts as a full-page skeleton until React mounts.
    -->
    <style>
      *,
      ::before,
      ::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        margin: 0;
        background-color: #0a0a0a;
        color: #e8e0d6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Full-page skeleton until React mounts and #root is non-empty */
      #root:empty {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        z-index: 9999;
      }
    </style>

    <!-- ─── Razorpay — deferred so it never blocks render ────────── -->
    <!--
      'defer' keeps this entirely off the critical path.
      The SDK will be ready long before any checkout interaction can fire.
      Do NOT add a preload for this — it causes a "preloaded but not used"
      console warning since Vite's bundler does not reference it directly.
    -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>

    <!-- ─── Structured Data (JSON-LD) ────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ClothingStore",
        "name": "TrendZip",
        "url": "https://trendzip.in",
        "description": "Premium D2C fashion brand for the modern Indian",
        "logo": {
          "@type": "ImageObject",
          "url": "https://trendzip.in/logo.svg",
          "width": 200,
          "height": 60
        },
        "image": "https://trendzip.in/og-image.jpg",
        "currenciesAccepted": "INR",
        "paymentAccepted": "Cash, Credit Card, Debit Card, UPI",
        "areaServed": "IN",
        "sameAs": [
          "https://instagram.com/trendzip",
          "https://twitter.com/trendzip"
        ],
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- ─── Module Entry Point ───────────────────────────────────── -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- ─── No-JS Fallback ───────────────────────────────────────── -->
    <noscript>
      <style>
        html,
        body {
          margin: 0;
          padding: 0;
          background: #0a0a0a;
          color: #e8e0d6;
          font-family: "DM Sans", system-ui, sans-serif;
          min-height: 100dvh;
          display: flex;
          align-items: center;
          justify-content: center;
          text-align: center;
        }

        .noscript-wrap {
          padding: 2rem;
          max-width: 28rem;
        }

        .noscript-wrap h1 {
          font-family: "Cormorant Garamond", Georgia, serif;
          font-size: clamp(1.5rem, 5vw, 2.25rem);
          font-weight: 300;
          letter-spacing: 0.04em;
          margin: 0 0 1rem;
        }

        .noscript-wrap p {
          font-size: 0.9rem;
          line-height: 1.6;
          color: #a09890;
          margin: 0 0 1.5rem;
        }

        .noscript-wrap a {
          display: inline-block;
          padding: 0.6rem 1.4rem;
          border: 1px solid #c9a96e;
          color: #c9a96e;
          text-decoration: none;
          font-size: 0.8rem;
          letter-spacing: 0.1em;
          text-transform: uppercase;
        }
      </style>

      <div class="noscript-wrap">
        <h1>TrendZip</h1>
        <p>
          This site requires JavaScript to run. Please enable it in your
          browser settings and reload the page.
        </p>
        <a
          href="https://enable-javascript.com"
          target="_blank"
          rel="noopener noreferrer"
        >
          How to enable JavaScript →
        </a>
      </div>
    </noscript>
  </body>
</html>
